services:
  db:
    image: mysql:8.4
    container_name: crud_node_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_USER: mysql
      MYSQL_PASSWORD: mysql
      MYSQL_DATABASE: crud_node_bd
    ports:
      - "3306:3306"
    volumes:
      - mysql_dados:/var/lib/mysql

volumes:
  mysql_dados: